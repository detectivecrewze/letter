<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Usage | Curator Dashboard</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" href="../../assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../../assets/favicon/favicon.ico" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <style>
        .italic-title {
            font-family: 'Caveat', cursive;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-4 md:p-12">
    <!-- Ambient Art & Textures -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="film-grain"></div>

    <div class="max-w-7xl mx-auto relative z-10 w-full">
        <!-- HEADER -->
        <header class="mb-10 flex flex-col md:flex-row justify-between md:items-end gap-6">
            <div class="title-block text-center md:text-left">
                <div class="mb-4">
                    <a href="../index.html" class="text-[10px] text-slate-400 hover:text-white transition-colors tracking-widest uppercase border border-white/10 rounded-lg px-4 py-2 bg-slate-900/50">← Back to Insights</a>
                </div>
                <h1 class="text-5xl md:text-6xl text-[#d4a373] italic-title mb-2">Template Usage</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-bold">Classic vs Airmail Distribution</p>
            </div>
            <div class="auth-section flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                <input id="admin-secret" type="password" placeholder="Access Key"
                    class="w-full md:w-48 bg-slate-800/40 border border-[#d4a373]/20 rounded-xl px-5 py-3.5 text-xs focus:outline-none focus:border-[#d4a373]/60 transition-all placeholder:text-slate-500 text-slate-100">
                <button id="btn-refresh"
                    class="btn-gold w-full md:w-auto text-[10px] uppercase tracking-[0.2em] px-8 py-3.5 rounded-xl transition-all font-bold whitespace-nowrap">
                    Synchronize
                </button>
            </div>
        </header>

        <!-- DASHBOARD STATS -->
        <div id="summary-section" class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 hidden">
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[9px] md:text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-2">Total Surat Terkirim</span>
                <span id="stat-total" class="text-4xl md:text-5xl font-light italic-title text-white">0</span>
            </div>
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center border-t-2 md:border-t-0 md:border-l-2 border-[#d4a373]/30">
                <span class="text-[9px] md:text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-2">Classic Letter</span>
                <span id="stat-classic" class="text-4xl md:text-5xl font-light italic-title text-[#d4a373]">0</span>
                <span id="pct-classic" class="text-[10px] font-bold text-slate-400 mt-2">0%</span>
            </div>
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center border-t-2 md:border-t-0 md:border-l-2 border-amber-500/30">
                <span class="text-[9px] md:text-[10px] uppercase tracking-[0.2em] text-amber-500/70 font-bold mb-2">Vintage Airmail</span>
                <span id="stat-airmail" class="text-4xl md:text-5xl font-light italic-title text-amber-500">0</span>
                <span id="pct-airmail" class="text-[10px] font-bold text-slate-400 mt-2">0%</span>
            </div>
        </div>

        <!-- TABLE SECTION -->
        <div class="glass-table-wrapper overflow-x-auto rounded-3xl border border-white/5">
            <table class="w-full text-left border-collapse min-w-[800px]">
                <thead>
                    <tr class="bg-slate-950/60">
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Identifier</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Penerima</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-[#d4a373] font-bold whitespace-nowrap border-b border-white/5">Template Type</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Tema Detail</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Tanggal Terkirim</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Action</th>
                    </tr>
                </thead>
                <tbody id="template-table-body">
                    <tr>
                        <td colspan="6" class="p-16 text-center text-slate-600 text-xs italic tracking-wide">
                            Masukkan <span class="text-[#d4a373]">Access Key</span> untuk memuat database template.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer class="mt-16 pb-8 flex justify-center items-center text-slate-700">
            <p class="text-[8px] uppercase tracking-[0.5em]">© 2026 Letter Edition Insights v1.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
