<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Insights | Curator Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .italic-title {
            font-family: 'Caveat', cursive;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-4 md:p-12">
    <!-- Ambient Art & Textures -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="film-grain"></div>

    <div class="max-w-7xl mx-auto relative z-10 w-full">
        <!-- HEADER -->
        <header class="mb-10 flex flex-col md:flex-row justify-between md:items-end gap-6">
            <div class="title-block text-center md:text-left">
                <h1 class="text-6xl text-[#d4a373] italic-title mb-2">Letter Insights</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-bold">Curating Digital Handmades</p>
            </div>
            <div class="auth-section flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                <input id="admin-secret" type="password" placeholder="Access Key"
                    class="w-full md:w-48 bg-slate-800/40 border border-[#d4a373]/20 rounded-xl px-5 py-3.5 text-xs focus:outline-none focus:border-[#d4a373]/60 transition-all placeholder:text-slate-500 text-slate-100">
                <button id="btn-refresh"
                    class="btn-gold w-full md:w-auto text-[10px] uppercase tracking-[0.2em] px-8 py-3.5 rounded-xl transition-all font-bold whitespace-nowrap">
                    Synchronize
                </button>
            </div>
        </header>

        <!-- FILTERS & SEARCH -->
        <div class="glass-card p-6 mb-8 flex flex-col md:flex-row gap-5 items-center w-full">
            <div class="relative w-full md:w-1/3">
                <input id="search-input" type="text" placeholder="Cari nama atau ID..."
                    class="w-full bg-slate-900/30 border border-white/10 rounded-xl px-12 py-3.5 text-xs focus:outline-none focus:border-[#d4a373]/40 transition-all placeholder:text-slate-600 text-slate-200">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#d4a373]/40 text-sm">✦</span>
            </div>

            <div class="flex flex-wrap md:flex-nowrap items-center gap-3 w-full md:w-2/3 justify-start md:justify-end">
                <div class="flex flex-col gap-1.5 w-[48%] md:w-auto flex-grow md:flex-grow-0">
                    <label class="text-[9px] uppercase tracking-[0.15em] text-slate-500 font-bold ml-1">Vibes / Tema</label>
                    <select id="filter-theme" class="select-premium px-4 py-3 cursor-pointer w-full">
                        <option value="all">Semua Tema</option>
                        <option value="sage">Sage Green</option>
                        <option value="rose">Rose Petal</option>
                        <option value="blush">Blush Cream</option>
                        <option value="midnight">Midnight Blue</option>
                    </select>
                </div>

                <div class="flex flex-col gap-1.5 w-[48%] md:w-auto flex-grow md:flex-grow-0">
                    <label class="text-[9px] uppercase tracking-[0.15em] text-slate-500 font-bold ml-1">Aktivitas</label>
                    <select id="filter-status" class="select-premium px-4 py-3 cursor-pointer w-full">
                        <option value="all">Seluruh Perjalanan</option>
                        <option value="active">Baru Dibuka (30 Hari)</option>
                        <option value="stale">Lama Terbuka (> 30 Hari)</option>
                        <option value="never">Belum Pernah Dibuka</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- BULK ACTIONS -->
        <div id="bulk-actions" class="hidden flex flex-col md:flex-row items-center justify-between mb-8 animate-fade-in glass-card p-5 border-l-4 border-l-rose-500 gap-4">
            <div class="flex items-center gap-3">
                <span id="selected-count" class="text-[10px] text-slate-100 font-bold uppercase tracking-[0.2em] bg-slate-950/40 px-4 py-2 rounded-lg border border-white/5">0 Item Terpilih</span>
            </div>
            <button id="btn-bulk-delete" class="w-full md:w-auto text-[10px] font-bold tracking-[0.15em] text-white bg-red-900/40 border border-red-500/30 px-6 py-2.5 rounded-xl hover:bg-red-800/60 transition-all uppercase">
                Hapus Terpilih
            </button>
        </div>

        <!-- DASHBOARD STATS -->
        <div id="summary-section" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5 mb-8 hidden">
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[8px] md:text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-1.5">Total Surat</span>
                <span id="stat-total" class="text-3xl md:text-4xl font-light italic-title text-[#d4a373]">0</span>
            </div>
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[8px] md:text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-1.5">Baru (24 Jam)</span>
                <span id="stat-today" class="text-3xl md:text-4xl font-light italic-title text-[#d4a373]">0</span>
            </div>
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[8px] md:text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-1.5">Tema Terpopuler</span>
                <span id="stat-theme" class="text-[10px] md:text-[11px] font-bold tracking-widest uppercase text-slate-200 mt-2">-</span>
            </div>
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[8px] md:text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-1.5">Melodi Favorit</span>
                <span id="stat-audio" class="text-[10px] md:text-[11px] font-bold tracking-widest uppercase text-slate-200 mt-2">-</span>
            </div>
        </div>

        <!-- TABLE SECTION -->
        <div class="glass-table-wrapper overflow-x-auto rounded-3xl border border-white/5">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead>
                    <tr class="bg-slate-950/60">
                        <th class="p-5 text-center w-12 border-b border-white/5">
                            <input type="checkbox" id="select-all" class="custom-checkbox">
                        </th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Identifier</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Penerima</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Detail Tema</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Musik / Melodi</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Terakhir Update</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Aktivitas</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Action</th>
                    </tr>
                </thead>
                <tbody id="gift-table-body">
                    <tr>
                        <td colspan="8" class="p-16 text-center text-slate-600 text-xs italic tracking-wide">
                            Masukkan <span class="text-[#d4a373]">Access Key</span> untuk memuat database surat.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer class="mt-16 pb-8 flex justify-center items-center text-slate-700">
            <p class="text-[8px] uppercase tracking-[0.5em]">© 2026 Letter Edition Insights v1.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
