<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Bonus Insights | Curator Dashboard</title>
    
    <link rel="icon" type="image/png" href="../../assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../../assets/favicon/favicon.ico" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

    <style>
        .italic-title {
            font-family: 'Caveat', cursive;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-4 md:p-12">
    <!-- Ambient Art & Textures -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="film-grain"></div>

    <div class="max-w-7xl mx-auto relative z-10 w-full">
        <!-- HEADER -->
        <header class="mb-10 flex flex-col md:flex-row justify-between md:items-end gap-6">
            <div class="title-block text-center md:text-left">
                <h1 class="text-6xl text-[#d4a373] italic-title mb-2">Bonus Insights</h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-slate-400 font-bold">Premium Users who claimed bonus</p>
            </div>
            <div class="auth-section flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
                <input id="admin-secret" type="password" placeholder="Access Key"
                    class="w-full md:w-48 bg-slate-800/40 border border-[#d4a373]/20 rounded-xl px-5 py-3.5 text-xs focus:outline-none focus:border-[#d4a373]/60 transition-all placeholder:text-slate-500 text-slate-100">
                <button id="btn-refresh"
                    class="btn-gold w-full md:w-auto text-[10px] uppercase tracking-[0.2em] px-8 py-3.5 rounded-xl transition-all font-bold whitespace-nowrap">
                    Synchronize
                </button>
            </div>
        </header>

        <!-- DASHBOARD STATS -->
        <div id="summary-section" class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-5 mb-8 hidden">
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[8px] md:text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-1.5">Total Pengguna Bonus</span>
                <span id="stat-total" class="text-3xl md:text-4xl font-light italic-title text-[#d4a373]">0</span>
            </div>
            <div class="glass-card summary-card p-6 flex flex-col justify-center items-center text-center">
                <span class="text-[8px] md:text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-1.5">Surat Bonus Baru (24 Jam)</span>
                <span id="stat-today" class="text-3xl md:text-4xl font-light italic-title text-[#d4a373]">0</span>
            </div>
        </div>

        <!-- TABLE SECTION -->
        <div class="glass-table-wrapper overflow-x-auto rounded-3xl border border-white/5">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead>
                    <tr class="bg-slate-950/60">
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Surat Utama (Premium)</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Surat Bonus (Diklaim)</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Penerima Utama</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Penerima Bonus</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Tanggal Klaim</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold whitespace-nowrap border-b border-white/5">Status Bonus</th>
                        <th class="p-5 text-[9px] uppercase tracking-[0.2em] text-[#d4a373] font-bold whitespace-nowrap border-b border-white/5">Action</th>
                    </tr>
                </thead>
                <tbody id="gift-table-body">
                    <tr>
                        <td colspan="7" class="p-16 text-center text-slate-600 text-xs italic tracking-wide">
                            Masukkan <span class="text-[#d4a373]">Access Key</span> untuk memuat data pengguna bonus.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer class="mt-16 pb-8 flex justify-center items-center text-slate-700">
            <p class="text-[8px] uppercase tracking-[0.5em]">© 2026 Letter Edition Insights v1.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
