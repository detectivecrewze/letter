<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Letter For You — Ribbon & Seal</title>
  <meta name="description" content="A heartfelt letter, delivered with magic across the sky.">
  <meta name="robots" content="noindex, nofollow">
  <meta id="theme-color-meta" name="theme-color" content="#ffffff">

  <!-- Inline script: Set theme BEFORE first paint to fix Safari overscroll bug -->
  <script>
    (function() {
      try {
        var params = new URLSearchParams(window.location.search);
        var theme = params.get('ribbonTheme') || 'ribbon-crimson';
        var configStr = params.get('config');
        if (configStr) {
          var cfg = JSON.parse(decodeURIComponent(atob(configStr)));
          if (cfg && cfg.ribbonTheme) theme = cfg.ribbonTheme;
        }
        document.documentElement.setAttribute('data-ribbon-theme', theme);
      } catch(e) {}
    })();
  </script>

  <!-- Open Graph (WhatsApp preview) -->
  <meta property="og:title" content="Ada surat untukmu 💌">
  <meta property="og:description" content="Seseorang mengirimkan sesuatu yang sangat spesial untukmu.">
  <meta property="og:type" content="website">

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Caveat:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Sacramento&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/themes/ribbon/style.css?v=2">
</head>

<body>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- ATMOSPHERE LAYERS                                      -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div class="static-bg" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- PASSWORD GATE                                         -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div id="password-gate" class="hidden">
    <div class="gate-card">
      <div class="gate-icon">
        <svg viewBox="0 0 72 72" width="64" height="64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M36 3 L41 8 L48 4 L50 11 L57 10 L55 17 L62 20 L57 26 L63 31 L57 35 L62 41 L55 42 L56 50 L49 48 L46 55 L39 51 L36 58 L33 51 L26 55 L23 48 L16 50 L17 42 L10 41 L15 35 L9 31 L15 26 L10 20 L17 17 L15 10 L22 11 L24 4 L31 8 Z" fill="var(--seal-red)"/>
          <circle cx="36" cy="30" r="18" fill="none" stroke="rgba(255,228,210,0.35)" stroke-width="1"/>
          <circle cx="36" cy="30" r="14" fill="rgba(0,0,0,0.08)"/>
          <path d="M36 21A4 4 0 0032 25C32 26.6 32.8 28 34 28.7V34H38V28.7C39.2 28 40 26.6 40 25A4 4 0 0036 21Z" fill="rgba(255,228,210,0.85)"/>
          <ellipse cx="29" cy="21" rx="5" ry="3" fill="rgba(255,255,255,0.12)" transform="rotate(-35 29 21)"/>
        </svg>
      </div>
      <h2 class="gate-title">This Letter is Sealed</h2>
      <p class="gate-desc">Enter the secret passcode to open it.</p>

      <div id="gate-hint-container" class="hidden">
        <span class="hint-label">Clue:</span>
        <p id="gate-hint-text"></p>
      </div>

      <div class="gate-input-wrapper">
        <input id="gate-password-input" type="password" placeholder="Enter passcode..." autocomplete="off" />
      </div>

      <button id="btn-gate-verify">Unseal Letter</button>
      <p id="gate-error" class="hidden">Incorrect passcode. Try again.</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STATE: MAINTENANCE                                     -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div id="state-maintenance" class="state-screen hidden">
    <div class="maintenance-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8b6b4a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:1rem">
        <path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      <h1>The Delivery is Paused</h1>
      <p>This letter is temporarily unavailable. It will be delivered again soon.</p>
      <div class="maint-footer">
        <span>RIBBON & SEAL</span>
        <span class="dot"></span>
        <span>EST. 2025</span>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STATE: LOADING                                         -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div id="state-loading" class="state-screen">
    <div class="loading-content">
      <div class="loading-spinner">
        <svg class="spinner-svg" width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(139,107,74,0.15)" stroke-width="3"/>
          <circle cx="32" cy="32" r="26" fill="none" stroke="#8b6b4a" stroke-width="3" stroke-linecap="round" stroke-dasharray="40 120" class="spinner-arc"/>
        </svg>
        <div class="spinner-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b6b4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </div>
      </div>
      <p class="loading-label">Your letter is on its way…</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STATE: ENVELOPE                                        -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div id="state-envelope" class="state-screen hidden">
    <div class="envelope-scene" id="envelope-scene">

      <!-- The Envelope -->
      <div class="ribbon-envelope" id="ribbon-envelope" role="button" aria-label="Open this letter" tabindex="0">

        <!-- Envelope body (kraft paper look) -->
        <div class="envelope-body">
          <!-- Flap -->
          <div class="envelope-flap"></div>

          <!-- Decorative botanical vine across envelope (SVG) -->
          <svg class="envelope-vine" viewBox="0 0 340 38" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- Main vine path -->
            <path d="M0 20 C28 14, 55 26, 85 18 S130 10, 170 19 S215 28, 255 18 S300 10, 340 20" stroke="#7a9e7e" stroke-width="1.3" fill="none" opacity="0.5"/>

            <!-- Sprig 1 — left of center -->
            <path d="M60 18 Q56 10 50 7" stroke="#7a9e7e" stroke-width="0.9" fill="none" opacity="0.45"/>
            <ellipse cx="48" cy="6" rx="4" ry="2.5" fill="#9cb8a0" opacity="0.45" transform="rotate(-30 48 6)"/>
            <ellipse cx="53" cy="9" rx="3.5" ry="2" fill="#9cb8a0" opacity="0.38" transform="rotate(-15 53 9)"/>

            <!-- Sprig 2 — just left of center -->
            <path d="M120 18 Q118 9 112 6" stroke="#7a9e7e" stroke-width="0.9" fill="none" opacity="0.45"/>
            <ellipse cx="110" cy="5" rx="4" ry="2.5" fill="#9cb8a0" opacity="0.45" transform="rotate(-25 110 5)"/>
            <ellipse cx="116" cy="8" rx="3" ry="1.8" fill="#9cb8a0" opacity="0.35" transform="rotate(-40 116 8)"/>

            <!-- Sprig 3 — just right of center -->
            <path d="M210 18 Q214 9 220 6" stroke="#7a9e7e" stroke-width="0.9" fill="none" opacity="0.45"/>
            <ellipse cx="222" cy="5" rx="4" ry="2.5" fill="#9cb8a0" opacity="0.45" transform="rotate(25 222 5)"/>
            <ellipse cx="216" cy="8" rx="3" ry="1.8" fill="#9cb8a0" opacity="0.35" transform="rotate(40 216 8)"/>

            <!-- Sprig 4 — right -->
            <path d="M285 18 Q289 9 296 7" stroke="#7a9e7e" stroke-width="0.9" fill="none" opacity="0.45"/>
            <ellipse cx="298" cy="6" rx="4" ry="2.5" fill="#9cb8a0" opacity="0.45" transform="rotate(30 298 6)"/>
            <ellipse cx="292" cy="9" rx="3.5" ry="2" fill="#9cb8a0" opacity="0.38" transform="rotate(15 292 9)"/>

            <!-- Tiny berries -->
            <circle cx="85" cy="18" r="2.2" fill="#d4b8c8" opacity="0.5"/>
            <circle cx="88" cy="15" r="1.6" fill="#c9a0a0" opacity="0.4"/>
            <circle cx="170" cy="19" r="2.2" fill="#d4b8c8" opacity="0.5"/>
            <circle cx="173" cy="16" r="1.6" fill="#c9a0a0" opacity="0.4"/>
            <circle cx="255" cy="18" r="2" fill="#d4b8c8" opacity="0.45"/>

            <!-- Small 5-petal blossom left -->
            <g transform="translate(38 28)" opacity="0.4">
              <circle cx="0" cy="-3.5" r="2.2" fill="#d4b8c8"/>
              <circle cx="3.3" cy="-1.1" r="2.2" fill="#d4b8c8"/>
              <circle cx="2" cy="2.5" r="2.2" fill="#d4b8c8"/>
              <circle cx="-2" cy="2.5" r="2.2" fill="#d4b8c8"/>
              <circle cx="-3.3" cy="-1.1" r="2.2" fill="#d4b8c8"/>
              <circle cx="0" cy="0" r="1.8" fill="#f5e8d8"/>
            </g>

            <!-- Small 5-petal blossom right -->
            <g transform="translate(302 28)" opacity="0.38">
              <circle cx="0" cy="-3.5" r="2.2" fill="#d4b8c8"/>
              <circle cx="3.3" cy="-1.1" r="2.2" fill="#d4b8c8"/>
              <circle cx="2" cy="2.5" r="2.2" fill="#d4b8c8"/>
              <circle cx="-2" cy="2.5" r="2.2" fill="#d4b8c8"/>
              <circle cx="-3.3" cy="-1.1" r="2.2" fill="#d4b8c8"/>
              <circle cx="0" cy="0" r="1.8" fill="#f5e8d8"/>
            </g>

            <!-- Lower hanging leaf pairs on vine -->
            <ellipse cx="28" cy="24" rx="4.5" ry="2.5" fill="#9cb8a0" opacity="0.35" transform="rotate(20 28 24)"/>
            <ellipse cx="145" cy="24" rx="4.5" ry="2.5" fill="#9cb8a0" opacity="0.3" transform="rotate(-15 145 24)"/>
            <ellipse cx="230" cy="22" rx="4" ry="2.2" fill="#9cb8a0" opacity="0.3" transform="rotate(10 230 22)"/>
            <ellipse cx="320" cy="24" rx="4" ry="2.2" fill="#9cb8a0" opacity="0.32" transform="rotate(-20 320 24)"/>
          </svg>

          <!-- Wax seal (theme icon injected by JS) -->
          <div class="wax-seal" id="wax-seal">
            <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" id="wax-seal-svg">
              <!-- Outer irregular blob seal edge -->
              <path id="seal-blob" d="
                M36 3
                L41 8 L48 4 L50 11 L57 10 L55 17
                L62 20 L57 26 L63 31 L57 35
                L62 41 L55 42 L56 50 L49 48
                L46 55 L39 51 L36 58
                L33 51 L26 55 L23 48
                L16 50 L17 42 L10 41
                L15 35 L9 31 L15 26
                L10 20 L17 17 L15 10
                L22 11 L24 4 L31 8 Z"
                fill="var(--seal-red)"/>
              <!-- Inner ring embossed detail -->
              <circle cx="36" cy="30" r="18" fill="none" stroke="rgba(255,228,210,0.35)" stroke-width="1"/>
              <circle cx="36" cy="30" r="14" fill="rgba(0,0,0,0.08)"/>
              <!-- Wax drip at bottom -->
              <ellipse cx="36" cy="57" rx="5" ry="3" fill="var(--seal-red)" opacity="0.75"/>
              <ellipse cx="36" cy="60" rx="3" ry="2" fill="var(--seal-red)" opacity="0.55"/>
              <!-- Inner emblem group (replaced per-theme by JS) -->
              <g id="seal-emblem" fill="rgba(255,228,210,0.70)" stroke="rgba(255,228,210,0.35)" stroke-width="0.6">
                <!-- Default: dove silhouette -->
                <path d="M30 35 Q32 28 36 26 Q40 28 42 35 Q39 32 36 33 Q33 32 30 35Z"/>
                <path d="M36 26 Q34 22 31 23 Q33 25 36 26Z"/>
                <path d="M36 26 Q38 22 41 23 Q39 25 36 26Z"/>
                <circle cx="33" cy="23.5" r="1.2" fill="rgba(255,228,210,0.8)"/>
              </g>
              <!-- Shine highlight on seal -->
              <ellipse cx="29" cy="21" rx="5" ry="3" fill="rgba(255,255,255,0.12)" transform="rotate(-35 29 21)"/>
            </svg>
          </div>

          <!-- Ribbon + Bow SVG -->
          <div class="ribbon-wrap" id="ribbon-wrap">
            <div class="ribbon-h"></div>
            <!-- Proper SVG bow: 2 loops + center knot + 2 tails -->
            <svg class="ribbon-bow-svg" viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" id="ribbon-bow-svg">
              <!-- Left loop -->
              <path d="M60 35 C52 20, 28 16, 18 28 C10 38, 22 50, 40 44 C52 40, 58 36, 60 35Z"
                fill="var(--ribbon-mid)" opacity="0.95"/>
              <!-- Left loop inner shadow -->
              <path d="M60 35 C52 20, 28 16, 18 28 C10 38, 22 50, 40 44 C52 40, 58 36, 60 35Z"
                fill="none" stroke="var(--ribbon-dark)" stroke-width="0.5" opacity="0.4"/>
              <!-- Left loop satin sheen -->
              <path d="M55 28 C46 20, 30 18, 22 26" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

              <!-- Right loop -->
              <path d="M60 35 C68 20, 92 16, 102 28 C110 38, 98 50, 80 44 C68 40, 62 36, 60 35Z"
                fill="var(--ribbon-mid)" opacity="0.95"/>
              <!-- Right loop inner shadow -->
              <path d="M60 35 C68 20, 92 16, 102 28 C110 38, 98 50, 80 44 C68 40, 62 36, 60 35Z"
                fill="none" stroke="var(--ribbon-dark)" stroke-width="0.5" opacity="0.4"/>
              <!-- Right loop satin sheen -->
              <path d="M65 28 C74 20, 90 18, 98 26" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

              <!-- Left tail -->
              <path d="M56 37 C50 44, 40 52, 32 62 C30 65, 34 67, 36 64 C44 54, 54 46, 59 38Z"
                fill="var(--ribbon-red)" opacity="0.9"/>
              <!-- Left tail sheen -->
              <path d="M54 40 C48 48, 38 56, 34 64" stroke="rgba(255,255,255,0.16)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

              <!-- Right tail -->
              <path d="M64 37 C70 44, 80 52, 88 62 C90 65, 86 67, 84 64 C76 54, 66 46, 61 38Z"
                fill="var(--ribbon-red)" opacity="0.9"/>
              <!-- Right tail sheen -->
              <path d="M66 40 C72 48, 82 56, 86 64" stroke="rgba(255,255,255,0.16)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

              <!-- Center knot circle -->
              <ellipse cx="60" cy="35" rx="8" ry="6" fill="var(--ribbon-dark)" opacity="0.95"/>
              <ellipse cx="60" cy="35" rx="8" ry="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
              <!-- Knot highlight -->
              <ellipse cx="57" cy="33" rx="3.5" ry="2" fill="rgba(255,255,255,0.18)" transform="rotate(-20 57 33)"/>
            </svg>
          </div>

          <!-- Recipient tag -->
          <div class="recipient-tag">
            <span class="tag-for">For</span>
            <span class="tag-name" id="env-to-name">Kamu</span>
          </div>
        </div>

        <!-- Tap hint -->
        <div class="tap-hint" id="tap-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6">
            <path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span class="tap-hint-text">gently open</span>
        </div>

      </div><!-- /ribbon-envelope -->

    </div><!-- /envelope-scene -->
  </div>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STATE: LETTER                                         -->
  <!-- ══════════════════════════════════════════════════════ -->
  <div id="state-letter" class="state-screen hidden">

    <!-- Background dove canvas (behind letter paper) -->
    <canvas id="bg-doves-canvas" aria-hidden="true"></canvas>

    <!-- Foreground dove canvas (in front of letter paper) -->
    <canvas id="fg-doves-canvas" aria-hidden="true"></canvas>

    <!-- Scroll wrapper -->
    <div class="letter-scroll">
      <article class="letter-paper" id="letter-paper" role="main">

        <!-- Watercolor edge wash (top) -->
        <div class="watercolor-edge watercolor-edge-top" aria-hidden="true"></div>

        <!-- Corner vine (top-left) -->
        <svg class="corner-vine corner-vine-tl" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M5 95 Q5 50 20 30 Q35 10 60 5" stroke="#9cb8a0" stroke-width="1" fill="none" opacity="0.5"/>
          <path d="M15 75 Q20 65 28 68" stroke="#9cb8a0" stroke-width="0.8" fill="none" opacity="0.4"/>
          <path d="M25 55 Q30 45 38 50" stroke="#9cb8a0" stroke-width="0.8" fill="none" opacity="0.35"/>
          <circle cx="18" cy="72" r="3.5" fill="#d4b8c8" opacity="0.25"/>
          <circle cx="28" cy="53" r="3" fill="#c9a0a0" opacity="0.2"/>
          <circle cx="10" cy="85" r="2.5" fill="#9cb8a0" opacity="0.3"/>
          <path d="M12 80 Q16 74 22 78" stroke="#7a9e7e" stroke-width="0.6" fill="none" opacity="0.3"/>
        </svg>

        <!-- Corner vine (top-right) -->
        <svg class="corner-vine corner-vine-tr" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M95 95 Q95 50 80 30 Q65 10 40 5" stroke="#9cb8a0" stroke-width="1" fill="none" opacity="0.5"/>
          <path d="M85 75 Q80 65 72 68" stroke="#9cb8a0" stroke-width="0.8" fill="none" opacity="0.4"/>
          <path d="M75 55 Q70 45 62 50" stroke="#9cb8a0" stroke-width="0.8" fill="none" opacity="0.35"/>
          <circle cx="82" cy="72" r="3.5" fill="#d4b8c8" opacity="0.25"/>
          <circle cx="72" cy="53" r="3" fill="#c9a0a0" opacity="0.2"/>
          <circle cx="90" cy="85" r="2.5" fill="#9cb8a0" opacity="0.3"/>
        </svg>

        <!-- Letter header -->
        <header class="letter-header">
          <div class="header-ornament">
            <svg width="100%" height="20" viewBox="0 0 300 20" preserveAspectRatio="none" fill="none" aria-hidden="true">
              <line x1="0" y1="10" x2="120" y2="10" stroke="#c8b89a" stroke-width="0.5" opacity="0.5"/>
              <path d="M130 10 Q140 3 150 10 Q160 17 170 10" stroke="#9cb8a0" stroke-width="1" fill="none" opacity="0.55"/>
              <circle cx="150" cy="10" r="2" fill="#c9a0a0" opacity="0.4"/>
              <line x1="180" y1="10" x2="300" y2="10" stroke="#c8b89a" stroke-width="0.5" opacity="0.5"/>
            </svg>
          </div>

          <h1 class="letter-title" id="letter-title"></h1>

          <div class="title-underline" aria-hidden="true">
            <svg width="100%" height="14" viewBox="0 0 300 14" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 7 Q 75 13, 150 7 T 300 7" stroke="#8b6b4a" stroke-width="1.2" fill="none" opacity="0.8"/>
              <path d="M20 10 Q 150 14, 280 10" stroke="#8b6b4a" stroke-width="0.5" fill="none" opacity="0.35"/>
              <circle cx="150" cy="7" r="2" fill="#c9a0a0" opacity="0.9"/>
            </svg>
          </div>
          
          <time class="meta-date" id="letter-date"></time>

          <div class="header-divider">
            <div class="divider-line"></div>
            <svg class="divider-leaf" width="20" height="14" viewBox="0 0 20 14" fill="none">
              <path d="M10 1 Q4 4 2 10 Q6 8 10 7 Q14 8 18 10 Q16 4 10 1Z" fill="#9cb8a0" opacity="0.45"/>
              <line x1="10" y1="1" x2="10" y2="13" stroke="#7a9e7e" stroke-width="0.6" opacity="0.4"/>
            </svg>
            <div class="divider-line"></div>
          </div>
        </header>

        <!-- Salutation -->
        <div class="letter-salutation">
          <span class="meta-to-name" id="letter-to"></span>
        </div>

        <!-- Body (injected by script.js via typewriter) -->
        <div class="letter-body" id="letter-body" aria-label="Letter content"></div>

        <!-- Footer: signature -->
        <footer class="letter-footer">
          <div class="footer-divider">
            <div class="divider-line"></div>
          </div>
          <div class="letter-from-wrap">
            <span class="letter-from" id="letter-from"></span>
          </div>
          <!-- Small pressed flower SVG -->
          <svg class="footer-flower" width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
            <circle cx="14" cy="11" r="4" fill="#d4b8c8" opacity="0.3"/>
            <circle cx="10" cy="13" r="3" fill="#c9a0a0" opacity="0.25"/>
            <circle cx="18" cy="13" r="3" fill="#c9a0a0" opacity="0.25"/>
            <circle cx="14" cy="16" r="3.5" fill="#d4b8c8" opacity="0.3"/>
            <circle cx="14" cy="13" r="2" fill="#ecd8c6" opacity="0.5"/>
            <line x1="14" y1="16" x2="14" y2="26" stroke="#7a9e7e" stroke-width="0.8" opacity="0.35"/>
            <path d="M14 20 Q10 18 8 22" stroke="#7a9e7e" stroke-width="0.6" fill="none" opacity="0.3"/>
          </svg>
        </footer>

        <!-- Watercolor edge wash (bottom) -->
        <div class="watercolor-edge watercolor-edge-bottom" aria-hidden="true"></div>

      </article>

      <!-- Action Buttons Container -->
      <div id="save-letter-container"
        style="display: none; opacity: 0; transition: opacity 1.2s ease-in-out; text-align: center; margin-top: 2.5rem; margin-bottom: 3rem; padding-bottom: 2rem;">
        <div id="letter-end"></div>

        <!-- Primary: Secret Memory Button -->
        <button id="btn-secret-memory" class="btn-ribbon-action btn-primary-action" style="display: none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          View Enclosed Photos
        </button>
        <br>

        <button id="btn-save-letter" class="btn-ribbon-action btn-secondary-action">

          Save This Letter
